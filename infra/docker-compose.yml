services:
  ui:
    image: node:22
    container_name: housemate-ui
    working_dir: /app
    volumes:
      - ../ui:/app
    ports:
      - "4200:4200"
    environment:
      NG_CLI_ANALYTICS: "false"
    command: >
      sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json"
    stdin_open: true
    tty: true

  api:
    image: webdevops/php-apache:8.4
    container_name: housemate-api
    working_dir: /var/www
    volumes:
      - ../api:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: housemate_db
      DB_USERNAME: housemate_user
      DB_PASSWORD: secret_password
      CACHE_STORE: file
    command: >
      sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8
    container_name: housemate-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: housemate_db
      MYSQL_USER: housemate_user
      MYSQL_PASSWORD: secret_password
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
