type AuthUser {
  id: ID!
  username: String!
  first_name: String!
  last_name: String!
  email: String!
  role: String
  permissions: [String!]! @rename(attribute: "permissions_list")
  phone_number: String
  valid_id: String
  landlord_status: String
}

type LoginResponse {
  status: String!
  message: String!
  token: String
  user: AuthUser
}

type LogoutResponse {
  status: String!
  message: String!
}

type BecomeLandlordResponse {
  status: String!
  message: String!
  user: AuthUser
}
