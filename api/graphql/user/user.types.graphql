type User {
    id: ID!
    username: String!
    first_name: String!
    last_name: String!
    email: String!
    role: String
    permissions: [String!]! @rename(attribute: "permissions_list")
    phone_number: String
    valid_id: String
    avatar: String
    created_at: String
    updated_at: String
    landlord_status: String
}
