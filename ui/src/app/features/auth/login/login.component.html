<div class="split-screen-container h-screen max-h-screen w-full lg:grid lg:grid-cols-2 overflow-hidden bg-zinc-50 relative">
  
  <!-- Left Column: Cover Image (Visible on Desktop) -->
  <div class="hidden lg:block relative h-full w-full bg-zinc-100 overflow-hidden lg:col-start-1 lg:col-span-1">
    <img src="/login.png" alt="Login Background" class="absolute inset-0 h-full w-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-tr from-black/10 via-transparent to-transparent pointer-events-none"></div>
  </div>

  <!-- Right Column: Form Container -->
  <div class="relative h-full w-full lg:col-start-2 lg:col-span-1 overflow-hidden flex flex-col justify-center">
    
    <!-- Login Form Wrapper (Animate entrance) -->
    <div class="flex flex-col justify-center p-6 sm:p-8 lg:p-12 h-full overflow-y-auto form-wrapper form-container-animate">
      <!-- Center Content -->
      <div class="w-full max-w-[400px] mx-auto py-8">
        <!-- Title Header -->
        <div class="text-left mb-8">
          <h2 class="text-3xl font-bold tracking-tight text-zinc-900 mb-2">Welcome back</h2>
        </div>

        <!-- Google Sign In Button -->
        <div class="w-full mb-4">
          <div #googleButtonLogin id="googleBtnLogin" class="google-button-host w-full min-h-[44px]"></div>
        </div>

        <!-- Divider -->
        <div class="relative flex py-4 items-center justify-center">
          <div class="flex-grow border-t border-zinc-200"></div>
          <span class="flex-shrink mx-4 text-xs font-medium text-zinc-400">or</span>
          <div class="flex-grow border-t border-zinc-200"></div>
        </div>

        <!-- ========== LOGIN FORM ========== -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <!-- Username Field -->
          <div>
            <div class="relative">
              <input
                id="username"
                type="text"
                formControlName="username"
                placeholder="Enter username"
                class="mobbin-input w-full px-5 py-3.5 bg-white border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:outline-none transition-all placeholder-zinc-400"
              />
            </div>
            <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" class="mt-1.5 ml-4">
              <p class="text-[11px] text-red-500 font-medium">Username is required.</p>
            </div>
          </div>

          <!-- Password Field -->
          <div>
            <div class="relative">
              <input
                id="password"
                [type]="showPassword() ? 'text' : 'password'"
                formControlName="password"
                placeholder="Enter password"
                class="mobbin-input w-full px-5 py-3.5 pr-12 bg-white border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:outline-none transition-all placeholder-zinc-400"
              />
              <button
                type="button"
                (click)="togglePassword()"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 transition-colors"
                aria-label="Toggle password visibility"
              >
                <ng-icon *ngIf="!showPassword()" name="heroEye" class="text-lg"></ng-icon>
                <ng-icon *ngIf="showPassword()" name="heroEyeSlash" class="text-lg"></ng-icon>
              </button>
            </div>
            <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="mt-1.5 ml-4">
              <p class="text-[11px] text-red-500 font-medium">Password is required (min 8 chars).</p>
            </div>
          </div>

          <!-- Options -->
          <div class="flex items-center justify-between px-2 text-xs">
            <label class="flex items-center space-x-2 cursor-pointer group">
              <input
                type="checkbox"
                formControlName="rememberMe"
                class="w-4 h-4 rounded border-zinc-300 text-zinc-900 focus:ring-0 cursor-pointer"
              />
              <span class="text-zinc-600 group-hover:text-zinc-900 transition-colors">Remember me</span>
            </label>
            <a href="#" class="font-medium text-zinc-900 hover:underline">Forgot?</a>
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage()"
            class="p-2.5 bg-red-50 border border-red-200 rounded-xl animate-fade-in">
            <p class="text-xs text-red-600 font-medium text-center">{{ errorMessage() }}</p>
          </div>

          <!-- Success Message -->
          <div *ngIf="successMessage()"
            class="p-2.5 bg-emerald-50 border border-emerald-200 rounded-xl animate-fade-in">
            <p class="text-xs text-emerald-600 font-medium text-center">{{ successMessage() }}</p>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            [disabled]="isLoading() || loginForm.invalid"
            class="w-full rounded-xl bg-zinc-900 hover:bg-zinc-800 text-white font-medium py-3.5 px-6 text-sm transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 mt-6"
          >
            <span *ngIf="!isLoading()">Continue</span>
            <span *ngIf="isLoading()" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              Processing...
            </span>
          </button>

          <!-- Toggle to Sign Up -->
          <div class="text-center pt-4 space-y-3">
            <p class="text-xs text-zinc-500">
              Don't have an account?
              <button type="button" (click)="navigateToSignup()" class="text-zinc-900 font-semibold hover:underline ml-1">Sign Up</button>
            </p>
            <div class="text-center text-[11px] text-zinc-400">
              By continuing, you agree to HouseMate's
              <a href="#" class="text-zinc-600 hover:underline">Terms of Service</a> and
              <a href="#" class="text-zinc-600 hover:underline">Privacy Policy</a>.
            </div>
          </div>
        </form>
      </div>
    </div>

  </div>

</div>
