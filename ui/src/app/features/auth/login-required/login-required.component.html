<div class="min-h-screen bg-[#F8FAFC] flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 py-12">
  <div class="max-w-md w-full bg-white rounded-[12px] border border-slate-200/80 shadow-md p-8 text-center flex flex-col items-center">
    
    <!-- Premium padlock icon wrapper with subtle animation/pulses -->
    <div class="w-20 h-20 rounded-full bg-[#CEEBFF]/50 text-[#18305E] flex items-center justify-center mb-6 shadow-inner animate-pulse">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-10 h-10">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
      </svg>
    </div>

    <!-- Message header -->
    <h2 class="text-2xl font-extrabold text-[#18305E] mb-3">Login to view the full details</h2>
    
    <!-- Descriptive body text -->
    <p class="text-sm text-[#727272] leading-relaxed mb-8 max-w-sm">
      To protect the privacy and safety of our verified student tenants and landlords, you must be logged in to view full listing descriptions, maps, and direct contact details.
    </p>

    <!-- CTAs -->
    <button (click)="goToLogin()" class="w-full py-3 bg-[#18305E] hover:bg-[#679AFA] text-white font-bold rounded-[4px] transition-colors uppercase tracking-wider text-sm shadow-sm cursor-pointer mb-3">
      Go Log In
    </button>
    
    <button (click)="goHome()" class="w-full py-3 border border-slate-300 hover:bg-slate-50 text-[#18305E] font-bold rounded-[4px] transition-colors uppercase tracking-wider text-sm cursor-pointer">
      Return to Home
    </button>

  </div>
</div>
