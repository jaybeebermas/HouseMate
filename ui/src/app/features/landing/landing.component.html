<div class="relative min-h-screen flex items-center justify-center overflow-hidden bg-[#0a0a0c] select-none">
  <!-- Decorative background circles -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>

  <!-- Main container -->
  <div class="relative z-10 w-full max-w-lg px-6 text-center animate-fade-in-up">
    <!-- Brand Logo Icon -->
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-tr from-indigo-600 to-purple-600 shadow-lg shadow-indigo-500/20 mb-8 border border-white/10">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-10 h-10 text-white">
        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
      </svg>
    </div>

    <!-- Title -->
    <h1 class="text-5xl font-black text-white tracking-tight mb-3">
      HouseSync
    </h1>
    
    <!-- Subtitle -->
    <p class="text-zinc-400 text-lg font-medium mb-12 max-w-md mx-auto leading-relaxed">
      Smart co-living management. Sync tasks, log utilities, and coordinate with housemates effortlessly.
    </p>

    <!-- Dynamic Actions -->
    <div class="space-y-4">
      <ng-container *ngIf="!authService.isAuthenticated(); else authenticatedUser">
        <!-- Guest View: Login or Signup -->
        <div class="flex flex-col sm:flex-row items-center gap-4 justify-center">
          <button (click)="goToLogin(false)" 
                  class="w-full sm:w-44 px-6 py-3.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-500 transition-all duration-200 cursor-pointer shadow-md shadow-indigo-600/10 border border-indigo-500/30 hover:scale-[1.02] active:scale-[0.98]">
            Log In
          </button>
          <button (click)="goToLogin(true)" 
                  class="w-full sm:w-44 px-6 py-3.5 text-sm font-semibold text-zinc-300 bg-white/5 rounded-xl hover:bg-white/10 hover:text-white transition-all duration-200 cursor-pointer border border-white/10 hover:scale-[1.02] active:scale-[0.98]">
            Sign Up
          </button>
        </div>
      </ng-container>

      <ng-template #authenticatedUser>
        <!-- Authenticated View -->
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-6 mb-6">
          <p class="text-zinc-400 text-sm font-medium">Logged in as</p>
          <h3 class="text-white text-lg font-bold mt-1">
            {{ currentUser?.first_name }} {{ currentUser?.last_name }}
          </h3>
          <p class="text-zinc-500 text-xs font-semibold uppercase tracking-wider mt-0.5">
            {{ currentUser?.role }}
          </p>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-4 justify-center">
          <!-- Go to Dashboard if Admin -->
          <ng-container *ngIf="currentUser?.role === 'admin' || currentUser?.role === 'super_admin' || currentUser?.role === 'superadmin'">
            <button (click)="goToDashboard()" 
                    class="w-full sm:w-48 px-6 py-3.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-500 transition-all duration-200 cursor-pointer shadow-md shadow-indigo-600/10 border border-indigo-500/30 hover:scale-[1.02] active:scale-[0.98]">
              Go to Dashboard
            </button>
          </ng-container>

          <button (click)="logout()" 
                  class="w-full sm:w-48 px-6 py-3.5 text-sm font-semibold text-zinc-300 bg-white/5 rounded-xl hover:bg-white/10 hover:text-white transition-all duration-200 cursor-pointer border border-white/10 hover:scale-[1.02] active:scale-[0.98]">
            Log Out
          </button>
        </div>
      </ng-template>
    </div>
  </div>
</div>
