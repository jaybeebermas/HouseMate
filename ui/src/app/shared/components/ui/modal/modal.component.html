<div *ngIf="isOpen"
     class="fixed inset-0 z-[150] flex items-center justify-center md:p-8 p-0 bg-slate-900/30 backdrop-blur-sm animate-in fade-in duration-200">
  
  <!-- Backdrop Click Area (Desktop only) -->
  <div class="absolute inset-0 hidden md:block" (click)="onClose()"></div>

  <!-- Modal Card -->
  <div class="relative bg-white w-full h-full md:h-auto md:rounded-2xl shadow-2xl shadow-slate-900/20 overflow-hidden animate-in duration-300 border border-slate-200/80 md:zoom-in-[0.98] md:slide-in-from-bottom-4 flex flex-col"
       [ngClass]="maxWidth">
    
    <!-- Header -->
    <div class="px-4 sm:px-8 pt-5 sm:pt-7 pb-3 sm:pb-4 flex items-start justify-between border-b border-slate-100">
      <div class="space-y-0.5 sm:space-y-1 min-w-0">
        <h2 class="text-lg sm:text-xl font-bold text-[#18305E] tracking-tight truncate">{{ title }}</h2>
        <p *ngIf="subtitle" class="text-xs sm:text-sm text-[#727272]">{{ subtitle }}</p>
      </div>
      <button (click)="onClose()" 
              class="p-1.5 rounded-xl hover:bg-slate-100 transition-colors shrink-0">
        <ng-icon name="heroXMark" class="h-5 w-5 text-[#727272]"></ng-icon>
      </button>
    </div>

    <!-- Body -->
    <div class="px-4 sm:px-8 py-4 sm:py-5 flex-1 md:max-h-[70vh] overflow-y-auto custom-scrollbar">
      <ng-content></ng-content>
    </div>

    <!-- Footer -->
    <div *ngIf="showFooter"
         class="px-4 sm:px-8 py-4 sm:py-5 border-t border-slate-100 flex items-center justify-end gap-2 sm:gap-3 shrink-0 bg-slate-50/50">
      <button type="button" 
              (click)="onClose()"
              class="px-4 sm:px-6 py-2.5 rounded-xl font-semibold text-sm sm:text-base text-[#727272] hover:text-[#18305E] hover:bg-white transition-all">
        {{ cancelLabel }}
      </button>
      <button type="button"
              (click)="onConfirm()"
              [disabled]="isConfirmDisabled || isLoading"
              class="px-4 sm:px-6 py-2.5 text-white rounded-xl font-semibold text-sm sm:text-base transition-all active:scale-[0.97] disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 shadow-lg"
              [ngClass]="confirmType === 'danger' ? 'bg-gradient-to-br from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 shadow-red-600/20' : 'bg-gradient-to-br from-[#18305E] to-[#254685] hover:from-[#254685] hover:to-[#18305E] shadow-[#18305E]/20'">
        <span *ngIf="!isLoading">{{ confirmLabel }}</span>
        <div *ngIf="isLoading" class="h-5 w-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      </button>
    </div>
    
    <!-- Custom Footer Slot -->
    <ng-content select="[modalFooter]"></ng-content>
  </div>
</div>
