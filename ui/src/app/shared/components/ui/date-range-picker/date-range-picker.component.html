<div class="w-full flex flex-col">
  <label *ngIf="label" class="label-classic">{{ label }}</label>
  <div 
    class="input-field flex items-center justify-between cursor-pointer relative"
    (click)="picker.open()"
    [class.opacity-50]="isDisabled()"
    [class.pointer-events-none]="isDisabled()"
  >
    <mat-date-range-input 
      [formGroup]="rangeForm"
      [min]="min"
      [max]="max"
      [rangePicker]="picker"
      class="w-full bg-transparent flex items-center gap-1 text-sm font-medium text-zinc-900 focus:outline-none"
    >
      <input 
        matStartDate 
        formControlName="start" 
        [placeholder]="startPlaceholder"
        class="bg-transparent border-none p-0 outline-none w-[45%] text-zinc-900 placeholder:text-zinc-400"
      />
      <span class="text-zinc-400 mx-1">—</span>
      <input 
        matEndDate 
        formControlName="end" 
        [placeholder]="endPlaceholder"
        class="bg-transparent border-none p-0 outline-none w-[45%] text-zinc-900 placeholder:text-zinc-400"
      />
    </mat-date-range-input>

    <button
      type="button"
      (click)="picker.open(); $event.stopPropagation()"
      [disabled]="isDisabled()"
      class="flex items-center text-zinc-400 hover:text-zinc-600 focus:outline-none disabled:opacity-50 disabled:pointer-events-none ml-2"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-primary-500">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
      </svg>
    </button>
    <mat-date-range-picker #picker></mat-date-range-picker>
  </div>
</div>
