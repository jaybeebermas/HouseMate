<div class="flex flex-col items-center justify-center text-center py-4">
  <div class="inline-flex items-center justify-center p-5 bg-red-50 text-red-500 rounded-2xl mb-5 shadow-sm border border-red-100/50">
    <ng-icon name="heroTrash" class="h-10 w-10" strokeWidth="2.5"></ng-icon>
  </div>
  
  <p class="text-[#485366] text-base leading-relaxed max-w-md">
    Are you sure you want to delete <span class="font-bold text-[#18305E]">{{ name }}</span>?
  </p>
  <p class="text-[11px] font-bold text-[#a1a1aa] mt-3 uppercase tracking-[0.1em]">
    This action is permanent and cannot be undone
  </p>
</div>
