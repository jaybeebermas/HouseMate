<div class="relative w-full">
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full select-field-std"
    [class.opacity-50]="isDisabled()"
    [class.pointer-events-none]="isDisabled()">
    <mat-label>{{ placeholder }}</mat-label>

    <!-- Optional prefix icon -->
    <div *ngIf="iconName" matPrefix class="flex items-center mr-1 text-[#727272]">
      <svg *ngIf="iconName === 'heroClock'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5 text-[#18305E]">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
      </svg>
      <svg *ngIf="iconName === 'heroMap'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-5 w-5 text-[#18305E]">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.897-2.448c.526-.263.85-.797.85-1.378V5.62c0-.604-.423-1.127-1.012-1.258l-5.114-1.136a2.25 2.25 0 0 0-1.892 0L6.75 3.125m-1.892 0L1.122 5.62A2.25 2.25 0 0 0 0 7.62v10.76c0 .604.423 1.127 1.012 1.258l5.114 1.136a2.25 2.25 0 0 0 1.892 0l5.114-1.136a2.25 2.25 0 0 1 1.892 0l5.114 1.136c.589.131 1.012-.392 1.012-1.258V7.62c0-.604-.423-1.127-1.012-1.258l-5.114-1.136A2.25 2.25 0 0 0 15 5.62M9 6.75l6-3.75m-6 3.75-6-3.75" />
      </svg>
    </div>

    <input
      type="text"
      [formControl]="internalControl"
      [matAutocomplete]="autoSelect"
      #autoSelectTrigger="matAutocompleteTrigger"
      readonly
      (blur)="onTouched()"
      matInput
    />

    <!-- Right filter icon -->
    <div matSuffix class="flex items-center pr-1 text-[#727272] cursor-pointer" (mousedown)="$event.preventDefault()" (click)="togglePanel($event, autoSelectTrigger)">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="h-5 w-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 0 1-.659 1.591l-5.432 5.432a2.25 2.25 0 0 0-.659 1.591v2.927a2.25 2.25 0 0 1-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 0 0-.659-1.591L3.659 7.409A2.25 2.25 0 0 1 3 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0 1 12 3Z" />
      </svg>
    </div>
  </mat-form-field>

  <!-- Connected Overlay Popup -->
  <mat-autocomplete #autoSelect="matAutocomplete" [displayWith]="getOptionLabel"
    panelClass="bg-white border border-slate-200/80 rounded-xl shadow-lg shadow-slate-900/10 py-1 max-h-60 overflow-y-auto scrollbar-thin">
    <mat-option *ngFor="let option of options" [value]="option"
      class="!px-4 !py-2.5 !text-sm !font-semibold !cursor-pointer !transition-all !duration-150 !text-[#485366] hover:!bg-[#CEEBFF]/60 active:!bg-[#CEEBFF]/80 focus:!bg-[#CEEBFF]/60 focus:!text-[#18305E]">
      {{ getOptionLabel(option) }}
    </mat-option>
    <mat-option *ngIf="options.length === 0" disabled
      class="!px-4 !py-3 !text-xs !font-semibold !text-[#a1a1aa] !text-center">
      No options available
    </mat-option>
  </mat-autocomplete>
</div>
