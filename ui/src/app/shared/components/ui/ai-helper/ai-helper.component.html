<!-- FLOATING ACTION BUTTON TRIGGER -->
<div class="fixed bottom-10 right-10 z-[9999]">
  
  <!-- Glow effect ring -->
  <span class="absolute inset-0 rounded-full bg-[#679AFA]/25 animate-ping opacity-75 select-none pointer-events-none" *ngIf="!isOpen()"></span>
  
  <button 
    (click)="toggleChat()" 
    class="relative w-14 h-14 rounded-full bg-[#18305E] text-white flex items-center justify-center shadow-xl hover:bg-[#254685] transition-all hover:scale-105 active:scale-95 cursor-pointer focus:outline-none"
    aria-label="Toggle AI Assistant"
  >
    <!-- Toggle Close/Open Icons -->
    <svg *ngIf="!isOpen()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 animate-pulse-slow">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 21l8.982-2.139M18 15.001a9 9 0 0 1-9 9M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM12 9.75h-.008v.008H12V9.75Z" />
    </svg>
    <svg *ngIf="isOpen()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
    </svg>
  </button>
</div>

<!-- EXPANDABLE CHAT PANEL -->
<div *ngIf="isOpen()" class="ai-chat-window fixed bottom-28 right-10 w-96 max-w-[calc(100vw-2rem)] h-[480px] max-h-[70vh] bg-white border border-zinc-200/80 shadow-2xl rounded-2xl overflow-hidden flex flex-col z-[9999] animate-chat-slide">
  
  <!-- Chat Window Header -->
  <div class="bg-[#18305E] text-white px-4 py-3.5 flex items-center justify-between shrink-0 select-none">
    <div class="flex items-center gap-2.5">
      <!-- AI Mascot Icon -->
      <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-[#679AFA]">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 21l8.982-2.139M18 15.001a9 9 0 0 1-9 9M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM12 9.75h-.008v.008H12V9.75Z" />
        </svg>
      </div>
      <div class="text-left">
        <h4 class="text-xs font-bold tracking-tight text-white">HouseMate AI Assistant</h4>
        <div class="flex items-center gap-1 mt-0.5">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="text-[9px] font-semibold text-[#679AFA]">Online & Ready</span>
        </div>
      </div>
    </div>
    
    <!-- Close Toggle -->
    <button (click)="toggleChat()" class="p-1 hover:bg-white/10 rounded-lg transition-colors cursor-pointer text-white/80 hover:text-white focus:outline-none">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Messages scroll area -->
  <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-zinc-50/50 flex flex-col scroll-container">
    
    <div *ngFor="let msg of messages()" 
         [ngClass]="{'self-end items-end': msg.sender === 'user', 'self-start items-start': msg.sender === 'ai'}"
         class="flex flex-col max-w-[85%]">
      
      <!-- Sender Tag -->
      <span class="text-[9px] font-bold text-zinc-400 mb-1 select-none">
        {{ msg.sender === 'user' ? 'You' : 'AI Helper' }}
      </span>

      <!-- Speech Bubble -->
      <div [ngClass]="{
             'bg-[#18305E] text-white rounded-2xl rounded-tr-none shadow-sm': msg.sender === 'user',
             'bg-white text-zinc-800 border border-zinc-200/80 rounded-2xl rounded-tl-none shadow-sm': msg.sender === 'ai'
           }" 
           class="p-3 text-xs leading-relaxed text-left whitespace-pre-line font-medium">
        {{ msg.text }}
      </div>
    </div>

    <!-- AI Thinking Loader bubble -->
    <div *ngIf="isTyping()" class="self-start items-start flex flex-col max-w-[80%]">
      <span class="text-[9px] font-bold text-zinc-400 mb-1 select-none">AI Helper</span>
      <div class="bg-white border border-zinc-200/80 rounded-2xl rounded-tl-none p-3 shadow-sm flex items-center gap-1 shrink-0">
        <span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
        <span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
        <span class="w-1.5 h-1.5 bg-zinc-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
      </div>
    </div>

  </div>

  <!-- Quick replies footer bar (visible if not typing) -->
  <div *ngIf="!isTyping()" class="px-4 py-2 border-t border-zinc-100 flex items-center gap-1.5 overflow-x-auto shrink-0 select-none bg-white horizontal-scroll-container">
    <button 
      *ngFor="let reply of quickReplies"
      (click)="sendMessage(reply)"
      class="px-2.5 py-1.5 bg-zinc-50 hover:bg-zinc-100 border border-zinc-200/60 rounded-lg text-zinc-600 text-[10px] font-semibold transition-all whitespace-nowrap cursor-pointer hover:border-zinc-300"
    >
      {{ reply }}
    </button>
  </div>

  <!-- User Input form footer -->
  <form (submit)="sendMessage(); $event.preventDefault()" class="p-3 border-t border-zinc-100 flex items-center gap-2 shrink-0 bg-white">
    <textarea 
      [(ngModel)]="newMessage" 
      name="messageInput"
      placeholder="Ask AI assistant..." 
      rows="1"
      (keydown.enter)="handleEnterKey($event)"
      class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-3 py-2 text-xs text-zinc-800 placeholder-zinc-400 focus:outline-none focus:border-[#18305E] focus:bg-white transition-all resize-none max-h-[68px] overflow-y-auto py-1.5"
      autocomplete="off"
    ></textarea>
    
    <button 
      type="submit" 
      [disabled]="!newMessage.trim() || isTyping()"
      class="w-8 h-8 rounded-lg bg-[#18305E] text-white flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed hover:bg-[#254685] transition-colors cursor-pointer shrink-0"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
      </svg>
    </button>
  </form>

</div>
