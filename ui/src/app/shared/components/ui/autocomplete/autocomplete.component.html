<div class="w-full flex flex-col">
  <label *ngIf="label" class="label-classic">{{ label }}</label>
  <div class="relative flex items-center">
    <input
      type="text"
      [formControl]="internalControl"
      [placeholder]="placeholder"
      [matAutocomplete]="auto"
      (blur)="onTouched()"
      class="input-field pr-10"
      [class.opacity-50]="isDisabled()"
      [class.pointer-events-none]="isDisabled()"
    />
    
    <!-- Indicator -->
    <div class="absolute right-3 flex items-center pointer-events-none text-zinc-400">
      <svg *ngIf="loading" class="animate-spin h-5 w-5 text-primary-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <svg *ngIf="!loading" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-zinc-400">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.637 10.637Z" />
      </svg>
    </div>

    <!-- Autocomplete panel -->
    <mat-autocomplete #auto="matAutocomplete" [displayWith]="getOptionLabel" (optionSelected)="onOptionSelected($event)" panelClass="bg-white border border-zinc-100 rounded-xl shadow-premium py-1 max-h-60 overflow-y-auto scrollbar-thin">
      <mat-option
        *ngFor="let option of options"
        [value]="option"
        class="!px-4 !py-2.5 !text-sm !font-semibold !cursor-pointer !transition-colors !duration-150 !text-zinc-700 hover:!bg-zinc-50 focus:!bg-primary-50 focus:!text-primary-700"
      >
        {{ getOptionLabel(option) }}
      </mat-option>
      
      <mat-option *ngIf="options.length === 0 && !loading" disabled class="!px-4 !py-3 !text-xs !font-semibold !text-zinc-400 !text-center">
        No results found
      </mat-option>
    </mat-autocomplete>
  </div>
</div>
