<div class="w-full flex flex-col">
  <label *ngIf="label" class="label-classic">{{ label }}</label>
  
  <div 
    class="input-field flex flex-wrap items-center gap-1.5 min-h-[46px] py-1.5 cursor-text"
    [class.opacity-50]="isDisabled()"
    [class.pointer-events-none]="isDisabled()"
  >
    <mat-chip-grid #chipGrid aria-label="Tag selection" class="w-full flex flex-wrap gap-1.5">
      @for (tag of tags(); track tag) {
        <mat-chip-row
          (removed)="remove(tag)"
          [editable]="false"
          class="custom-chip bg-primary-50 text-primary-700 font-semibold border border-primary-100 rounded-lg px-2.5 py-1 text-xs flex items-center gap-1"
        >
          {{ tag }}
          @if (removable && !isDisabled()) {
            <button 
              matChipRemove 
              class="text-primary-500 hover:text-primary-700 focus:outline-none flex items-center justify-center p-0.5 rounded-full hover:bg-primary-100"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
              </svg>
            </button>
          }
        </mat-chip-row>
      }
      <input
        [placeholder]="tags().length === 0 ? placeholder : ''"
        [matChipInputFor]="chipGrid"
        [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
        [matChipInputAddOnBlur]="addOnBlur"
        (matChipInputTokenEnd)="add($event)"
        [disabled]="isDisabled()"
        class="flex-1 bg-transparent border-none outline-none text-sm text-zinc-900 placeholder:text-zinc-400 min-w-[120px] focus:ring-0 p-0"
      />
    </mat-chip-grid>
  </div>
</div>
